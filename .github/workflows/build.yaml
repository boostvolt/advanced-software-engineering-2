name: SonarQube
on:
    push:
        branches:
            - main
    pull_request:
        types: [ opened, synchronize, reopened ]

jobs:
    build:
        name: Build and analyze
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - project-name: catan-ai
                      project-key: catan-ai
                      working-directory: task-2-case-study/implementation/catan-ai
                    - project-name: catan-human
                      project-key: catan-human
                      working-directory: task-2-case-study/implementation/catan-human

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  java-version: 17
                  distribution: "zulu"

            - name: Cache SonarQube packages
              uses: actions/cache@v5
              with:
                  path: ~/.sonar/cache
                  key: ${{ runner.os }}-sonar
                  restore-keys: ${{ runner.os }}-sonar

            - name: Cache Maven packages
              uses: actions/cache@v5
              with:
                  path: ~/.m2
                  key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
                  restore-keys: ${{ runner.os }}-m2

            - name: Build and analyze ${{ matrix.project-name }}
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              working-directory: ${{ matrix.working-directory }}
              run: >
                  mvn -B verify
                  org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
                  -Dsonar.projectKey=${{ matrix.project-key }}
